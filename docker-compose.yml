services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: dropmind
      POSTGRES_USER: dropmind
      POSTGRES_PASSWORD: dropmind
    ports:
      - "5432:5432"
    volumes:
      - dropmind_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dropmind"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dropmind_postgres:
